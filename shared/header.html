<!-- Shared Header -->
<!-- This file contains the header/navbar that should be included in all pages -->
<!-- Include this right after the opening <body> tag -->

<header id="top" class="navbar" role="banner" aria-label="Primary" data-shared-header-loaded>
  <div class="container nav">
    <a class="brand" href="/" aria-label="grona home">
      <img
        src="/assets/logo.png"
        alt="Grona.ai - Agentic CRO platform logo"
        width="300"
        height="75"
        data-theme-logo
        data-logo-light="/assets/logo.png"
        data-logo-dark="/assets/Grona_light.png"
      />
    </a>
    <div class="spacer"></div>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="/how-it-works/">How it works</a>
      <a href="/features/">Features</a>
      <a href="/pricing/">Pricing</a>
      <a href="https://grona.ai/beta-access/" class="nav-cta-join-beta btn-beta">Join Beta</a>
    </nav>
    <button
      class="theme-toggle"
      id="theme-toggle"
      aria-label="Toggle dark mode"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
    <button class="menu-btn" aria-label="Open menu" aria-expanded="false">
      <svg
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </div>
</header>
